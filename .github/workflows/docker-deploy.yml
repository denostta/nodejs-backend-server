name: Build and Deploy Docker Image

# Triggers: runs on every push to the 'main' branch
on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - 'main'

jobs:
  build-and-push:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
    # 1. check out your source code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Login to Dockerhub using secrets
    - name: Login to Dockerhub
      uses: docker/login-action@v3
      with: 
        username: ${{ secrets.DOCKER_USERNAME}}
        password: ${{ secrets.DOCKER_PASSWORD}}

    # 3. Setup docker buildx (advanced builder, supports caching)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 4. Build the image and push to your private DockerHub repo
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME}}/nodejs-backend-server:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/your-repo-name:${{ github.sha }}
        cache-from: type=gha           # Use GitHub Actions cache to speed up builds
        cache-to: type=gha,mode=max

    # 5. Tell Render to redeploy using the new image
    - name: Trigger Render Deploy
      run: |
        curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            --fail \
            -o /dev/null \
            -w "Render deploy triggered. HTTP status: %{http_code}\n"
